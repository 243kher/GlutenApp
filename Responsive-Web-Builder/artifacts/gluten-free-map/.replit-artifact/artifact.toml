kind = "web"
previewPath = "/"
title = "GlutenFree Map"
version = "1.0.0"
id = "artifacts/gluten-free-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24415

[services.development]
run = "pnpm --filter @workspace/gluten-free-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gluten-free-map", "run", "build" ]
publicDir = "artifacts/gluten-free-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24415"
BASE_PATH = "/"
