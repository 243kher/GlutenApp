        count:
          type: integer
      required:
        - type
        - count

    # Admin
    Report:
      type: object
      properties:
        id:
          type: integer
        establishmentId:
          type: integer
        establishmentName:
          type: string
        userId:
          type: integer
        userName:
          type: string
        type:
          type: string
          enum: [cross_contamination, wrong_info, closed, other]
        description:
          type: string
        status:
          type: string
          enum: [pending, resolved]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - establishmentId
        - establishmentName
        - userId
        - userName
        - type
        - description
        - status
        - createdAt

