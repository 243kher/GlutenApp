services:
  - type: web
    name: glutenapp
    runtime: node
    rootDir: Responsive-Web-Builder
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/gluten-free-map run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: glutenapp-db
          property: connectionString

databases:
  - name: glutenapp-db
    plan: free
